<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeaVibe - Chọn Khoảnh Khắc</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap');

        /* ĐỒNG BỘ CON TRỎ CHUỘT ĐINH BA POSEIDON */
        body, a, .card, div {
            cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='36' height='36' style='font-size:26px;'><text x='18' y='26' text-anchor='middle' transform='rotate(-25 18 18)'>🔱</text></svg>") 8 4, auto !important;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Quicksand', sans-serif;
        }

        /* Container chứa hình nền */
        #bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-color: #1a1a2e; /* Thêm màu nền tối lót bên dưới chống chớp trắng */
            
            /* Gắn hình nền GIF mặc định Lofi */
            background-image: url('https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExMTdyajY3bnF6bWhycXQ4NDRqc21qZW5ldzRycHYxOTdxZDlyNTkxcCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/798oH0WDEQnicM4857/giphy.gif');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            /* Hiệu ứng chuyển cảnh mượt */
            transition: background-image 0.6s ease-in-out; 
        }

        /* Lớp phủ tối nhẹ để làm nổi bật các thẻ */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.35); /* Chỉnh tối lại một xíu để nhìn chữ rõ hơn */
            z-index: 0;
        }

        /* Nội dung chính */
        .content {
            position: relative;
            z-index: 1;
            min-height: 100vh; 
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        h1 {
            font-size: 36px;
            margin-bottom: 40px;
            font-weight: 700;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
        }

        /* Bố cục 3 thẻ (Cards) */
        .cards-wrapper {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
        }

        .card {
            background: rgba(255, 255, 255, 0.1); /* Kính mờ */
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            width: 250px;
            padding: 40px 20px;
            transition: transform 0.3s ease, background 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .card h2 {
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: 600;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
        }

        .card p {
            font-size: 14px;
            color: #e0f7fa;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        /* Icon Emoji minh họa */
        .icon {
            font-size: 48px;
            margin-bottom: 15px;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.3));
        }

        /* Chấm đỏ nhấp nháy cho thẻ Live */
        .live-dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            background-color: #ff4757;
            border-radius: 50%;
            margin-left: 8px;
            box-shadow: 0 0 8px #ff4757;
            animation: blink 1.5s infinite ease-in-out;
        }

        @keyframes blink {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* RESPONSIVE */
        @media (max-width: 1024px) {
            h1 { font-size: 32px; }
            .cards-wrapper { gap: 20px; }
            .card { width: 220px; padding: 30px 15px; }
        }

        @media (max-width: 768px) {
            h1 { font-size: 26px; margin-bottom: 30px; padding: 0 10px; }
            .cards-wrapper { flex-direction: column; align-items: center; gap: 20px; }
            .card { width: 100%; max-width: 320px; padding: 25px 20px; }
            .icon { font-size: 40px; margin-bottom: 10px; }
        }

        @media (max-width: 480px) {
            h1 { font-size: 22px; }
            .card { max-width: 100%; }
        }
    </style>
</head>
<body>

    <div id="bg-container">
        <div class="overlay"></div>
    </div>

    <div class="content">
        <h1>Bạn muốn tận hưởng khoảnh khắc nào?</h1>
        
        <div class="cards-wrapper">
            <div class="card" onmouseover="changeBg('sunrise')" onmouseout="resetBg()" onclick="window.location.href='Layout3.html';">
                <div class="icon">🌅</div>
                <h2>Bình Minh</h2>
                <p>Bắt đầu ngày mới với ánh nắng dịu nhẹ</p>
            </div>

             <div class="card" onmouseover="changeBg('sunset')" onmouseout="resetBg()" onclick="window.location.href='Layout3.html';">
                <div class="icon">🌇</div>
                <h2>Hoàng Hôn</h2>
                <p>Thư giãn trong dải màu cam tím lãng mạn</p>
            </div>

            <div class="card" onmouseover="changeBg('live')" onmouseout="resetBg()" onclick="window.location.href='Layout3.html';">
                <div class="icon">🌊</div>
                <h2>Live 24/7 <span class="live-dot"></span></h2>
                <p>Nghe tiếng sóng vỗ theo thời gian thực</p>
            </div>
        </div>
    </div>

    <script>
        const bgContainer = document.getElementById('bg-container');
        
        // Link GIF Lofi mặc định (Khi không rê chuột vào đâu)
        const defaultBg = "url('https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExMTdyajY3bnF6bWhycXQ4NDRqc21qZW5ldzRycHYxOTdxZDlyNTkxcCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/798oH0WDEQnicM4857/giphy.gif')";

        // Hình nền cho các trạng thái rê chuột (Đã cập nhật link Bình Minh và Live mới)
        const images = {
            sunrise: "url('https://media3.giphy.com/media/v1.Y2lkPTc5MGI3NjExd2R5ZDZhZnc3OHJseW5mbWlkZ3cwb3Q3YnVwbTl4ejZmb3FmbWZ3MyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/U4PY30Rwqop7BYWwWV/giphy.gif')",
            sunset: "url('https://images.unsplash.com/photo-1471922614646-a1284d766b11?auto=format&fit=crop&w=1920&q=80')", 
            live: "url('https://media0.giphy.com/media/v1.Y2lkPTc5MGI3NjExaDJycGc5Y2NoYjY4ZjIyNDk2cnFiazVyYTI4aWluOTF1cWhlNTkyeiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/POBkLjTpvXbsoaa2ES/giphy.gif')"
        };

        // TÍNH NĂNG PRELOAD ẢNH: Tải ngầm ảnh trước để rê chuột không bị chớp trắng
        Object.values(images).forEach(url => {
            const img = new Image();
            // Tách lấy đường link bên trong chữ url('')
            img.src = url.replace("url('", "").replace("')", "");
        });

        // Đổi hình nền (Chỉ đổi thuộc tính backgroundImage)
        function changeBg(type) {
            bgContainer.style.backgroundImage = images[type];
        }

        // Khôi phục về ảnh GIF Lofi mặc định khi chuột đưa ra ngoài thẻ
        function resetBg() {
            bgContainer.style.backgroundImage = defaultBg;
        }
    </script>

</body>
</html>
