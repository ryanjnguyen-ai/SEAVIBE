<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeaVibe - Phòng Live Tương Tác</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Asap+Condensed:wght@500;700&family=Quicksand:wght@500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Quicksand', sans-serif;
            background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?ixlib=rb-1.2.1&auto=format&fit=crop&w=1920&q=80') no-repeat center center/cover;
            position: relative;
        }

        .vintage-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(43, 91, 92, 0.4) 0%, rgba(200, 160, 120, 0.4) 100%);
            mix-blend-mode: multiply;
            z-index: 1; pointer-events: none;
        }

        /* --- HEADER --- */
        header {
            position: relative; z-index: 50;
            padding: 20px 40px; display: flex;
            justify-content: space-between; align-items: center;
        }

        .header-left { display: flex; align-items: center; gap: 20px; }

        .icon-btn {
            width: 45px; height: 45px; border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(8px);
            cursor: pointer; display: flex; justify-content: center; align-items: center;
            transition: 0.3s; color: #fff; font-size: 20px;
        }
        .icon-btn:hover { background: rgba(255, 255, 255, 0.5); }

        .live-title {
            color: #fff; font-size: 24px; font-weight: 700;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.5);
            display: flex; align-items: center; gap: 10px;
        }

        .live-dot {
            width: 10px; height: 10px; background-color: #ff4757;
            border-radius: 50%; box-shadow: 0 0 8px #ff4757;
            animation: blink 1.5s infinite;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        /* HEADER RIGHT (SPOTIFY & CHAT) */
        .header-right {
            display: flex; gap: 15px; align-items: center;
        }

        .btn-toggle-chat {
            background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 10px 20px; border-radius: 20px;
            color: #fff; font-weight: 700; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; gap: 8px;
        }
        .btn-toggle-chat:hover { background: rgba(255, 255, 255, 0.4); }

        .spotify-wrapper { position: relative; }

        .btn-spotify {
            background: rgba(30, 215, 96, 0.2); backdrop-filter: blur(10px); 
            border: 1px solid rgba(30, 215, 96, 0.5);
            border-radius: 30px; padding: 10px 20px; color: #fff; font-weight: 700; 
            cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 8px;
        }
        .btn-spotify:hover { background: rgba(30, 215, 96, 0.5); }

        .spotify-player-box {
            display: none; position: absolute; top: 130%; right: 0; 
            width: 320px; height: 152px; border-radius: 15px; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 100;
        }
        .spotify-player-box.show { display: block; animation: slideDown 0.3s ease-out; }

        @keyframes slideDown { 
            from { opacity: 0; transform: translateY(-10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        /* --- BỐ CỤC CHÍNH --- */
        .main-container {
            position: relative; z-index: 10; display: flex;
            height: calc(100vh - 85px); padding: 0 40px 30px 40px; gap: 30px;
        }

        /* 1. KHU VỰC VIDEO & PLAYLIST */
        .video-wrapper-section {
            flex: 1; display: flex; flex-direction: column; gap: 20px;
            transition: all 0.4s ease;
        }

        .player-container {
            width: 100%; background: rgba(0, 0, 0, 0.6);
            border: 3px solid #87CEEB; border-radius: 15px;
            overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: flex; flex-direction: column;
        }

        #video-wrapper {
            width: 100%; position: relative; padding-top: 56.25%; pointer-events: none; 
        }

        #video-wrapper iframe {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        }

        /* THANH TIẾN ĐỘ (SEEK BAR) */
        .seek-bar-container {
            width: 100%; background: rgba(255,255,255,0.1); display: flex; align-items: center;
        }
        .seek-bar {
            width: 100%; -webkit-appearance: none; appearance: none;
            background: transparent; height: 10px; cursor: pointer; outline: none; margin: 0;
            z-index: 20; position: relative;
        }
        .seek-bar::-webkit-slider-runnable-track {
            width: 100%; height: 6px; background: rgba(255,255,255,0.3);
        }
        .seek-bar::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none;
            width: 16px; height: 16px; background: #87CEEB; border-radius: 50%;
            margin-top: -5px; transition: 0.2s; box-shadow: 0 0 10px rgba(135, 206, 235, 0.8);
        }
        .seek-bar::-webkit-slider-thumb:hover { transform: scale(1.3); }

        .custom-controls {
            background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(15px);
            padding: 12px 25px; display: flex; justify-content: space-between; align-items: center;
        }

        .control-group { display: flex; align-items: center; gap: 15px; }

        .control-btn {
            background: none; border: none; color: #fff; font-size: 20px;
            cursor: pointer; transition: 0.3s; display: flex; align-items: center;
        }
        .control-btn:hover { color: #f4a460; transform: scale(1.1); }

        .volume-slider { width: 90px; accent-color: #87CEEB; cursor: pointer; }
        .time-display { color: #fff; font-size: 14px; font-weight: 600; margin-left: 10px; }

        /* DANH SÁCH PLAYLIST (GIAO DIỆN MỚI) */
        .playlist-section {
            background: rgba(0,0,0,0.4); backdrop-filter: blur(10px);
            border-radius: 15px; padding: 15px; border: 1px solid rgba(255,255,255,0.2);
        }
        .playlist-section h3 { color: #fff; font-size: 16px; margin-bottom: 12px; font-family: 'Quicksand', sans-serif;}
        
        .playlist-items {
            display: flex; gap: 15px; overflow-x: auto; padding-bottom: 10px;
            scrollbar-width: thin; scrollbar-color: #87CEEB transparent;
        }
        .playlist-items::-webkit-scrollbar { height: 6px; }
        .playlist-items::-webkit-scrollbar-thumb { background: #87CEEB; border-radius: 10px; }

        /* Chỉnh sửa hiển thị ảnh nhỏ bên trái, text bên phải */
        .playlist-item {
            display: flex; align-items: center; gap: 10px;
            flex: 0 0 auto; min-width: 220px; padding: 8px; border-radius: 8px; cursor: pointer;
            border: 1px solid rgba(255,255,255,0.2); transition: 0.3s; background: rgba(0,0,0,0.3);
        }
        .playlist-item:hover, .playlist-item.active { 
            border-color: #87CEEB; background: rgba(135, 206, 235, 0.2); transform: translateY(-3px); 
        }
        .playlist-item img { 
            width: 60px; height: 45px; object-fit: cover; border-radius: 5px; 
        }
        .playlist-item span {
            color: #fff; font-size: 14px; font-weight: 600;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        /* 2. KHU VỰC CHAT */
        .chat-section {
            width: 380px; background: rgba(0, 0, 0, 0.3); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 15px;
            display: flex; flex-direction: column; overflow: hidden;
            transition: all 0.4s ease; 
        }

        .chat-section.hidden { 
            width: 0; opacity: 0; margin-left: -30px; padding: 0; border: none; pointer-events: none;
        }

        .chat-header {
            padding: 15px; border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff; font-weight: 700; text-align: center; white-space: nowrap;
        }

        .chat-messages {
            flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column;
            gap: 15px; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.3) transparent;
            min-width: 300px; 
        }

        .message { display: flex; gap: 10px; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .avatar {
            width: 35px; height: 35px; background: #f4a460; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-weight: bold; color: #fff; font-size: 14px; flex-shrink: 0; 
        }

        .msg-content {
            background: rgba(255, 255, 255, 0.15); padding: 10px 15px;
            border-radius: 0 15px 15px 15px; color: #fff; font-size: 14px; line-height: 1.4; word-break: break-word; 
        }
        .msg-author { font-size: 12px; color: #87CEEB; font-weight: 700; margin-bottom: 3px; }

        .message.self { flex-direction: row-reverse; }
        .message.self .msg-content { border-radius: 15px 0 15px 15px; background: rgba(135, 206, 235, 0.2); }
        .message.self .msg-author { text-align: right; color: #f4a460; }

        /* KHUNG NHẬP CHAT VÀ STICKER */
        .chat-input-wrapper {
            padding: 15px; border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; align-items: center; gap: 8px; position: relative;
            min-width: 300px;
        }

        .btn-emoji {
            background: none; border: none; font-size: 24px; cursor: pointer; transition: 0.2s;
        }
        .btn-emoji:hover { transform: scale(1.1); }

        .chat-input-wrapper input {
            flex: 1; padding: 10px 15px; border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3); background: rgba(255, 255, 255, 0.1);
            color: #fff; outline: none; font-family: 'Quicksand', sans-serif;
        }

        .btn-send {
            background: #87CEEB; border: none; border-radius: 50%; width: 40px; height: 40px;
            color: #000; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: 0.2s; flex-shrink: 0;
        }
        .btn-send:hover { background: #f4a460; color: #fff; }

        .emoji-picker {
            position: absolute; bottom: 65px; left: 15px;
            background: rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.3);
            border-radius: 10px; padding: 10px; display: none; gap: 8px; flex-wrap: wrap;
            width: 220px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); z-index: 20;
        }
        .emoji-picker.show { display: flex; animation: slideUp 0.2s ease; }
        .emoji-picker span { font-size: 24px; cursor: pointer; transition: 0.2s; }
        .emoji-picker span:hover { transform: scale(1.3); }


        /* --- RESPONSIVE CHO ĐIỆN THOẠI & TABLET --- */
        @media (max-width: 1024px) {
            body { height: auto; overflow-x: hidden; overflow-y: auto; }
            header { flex-wrap: wrap; gap: 15px; }
            .main-container { flex-direction: column; height: auto; padding: 0 20px 20px 20px; gap: 20px; }
            .chat-section { width: 100%; height: 450px; }
            .chat-section.hidden { display: none !important; }
            .chat-messages, .chat-input-wrapper { min-width: unset; }
        }
        
        @media (max-width: 480px) {
            .header-right { width: 100%; justify-content: space-between; }
            .spotify-player-box { right: auto; left: 0; width: 100%; max-width: 300px; }
            .time-display { display: none; } 
            .control-group { gap: 10px; }
            .volume-slider { width: 60px; }
        }
    </style>
</head>
<body>

    <div class="vintage-overlay"></div>

    <header>
        <div class="header-left">
            <button class="icon-btn" onclick="history.back();" title="Quay lại">❮</button>
            <div class="live-title" id="main-title">
                <div class="live-dot"></div> Đảo Phú Quý - Trải nghiệm Local
            </div>
        </div>
        
        <div class="header-right">
            <div class="spotify-wrapper">
                <button class="btn-spotify" onclick="toggleSpotify()">🎵 Spotify</button>
                <div class="spotify-player-box" id="spotify-player">
                    <iframe src="https://open.spotify.com/playlist/5XHizMAmlrmgnRS20Xw0Qe?si=IgKDknL3TIirPVFBz1mcfA" width="100%" height="152" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
                </div>
            </div>
            <button class="btn-toggle-chat" onclick="toggleChat()">💬 Ẩn / Hiện Chat</button>
        </div>
    </header>

    <div class="main-container">
        
        <div class="video-wrapper-section">
            <div class="player-container" id="player-container">
                <div id="video-wrapper">
                    <iframe 
                        id="yt-video"
                        src="https://www.youtube.com/embed/9g8XTTFZPBg?autoplay=1&mute=1&controls=0&rel=0&showinfo=0&enablejsapi=1" 
                        frameborder="0" 
                        allow="autoplay; fullscreen; picture-in-picture">
                    </iframe>
                </div>
                
                <div class="seek-bar-container">
                    <input type="range" class="seek-bar" id="seek-bar" min="0" max="100" value="0">
                </div>

                <div class="custom-controls">
                    <div class="control-group">
                        <button class="control-btn" onclick="seekVideo(-10)" title="Lùi 10 giây">⏪</button>
                        <button class="control-btn" id="btn-play" onclick="togglePlayPause()" title="Phát / Tạm dừng">⏸</button>
                        <button class="control-btn" onclick="seekVideo(10)" title="Tiến 10 giây">⏩</button>
                        
                        <button class="control-btn" id="btn-mute" onclick="toggleMute()" title="Bật / Tắt âm thanh">🔇</button>
                        <input type="range" class="volume-slider" id="volume-slider" min="0" max="100" value="50" oninput="changeVolume()">
                        <span class="time-display" id="time-display">0:00 / 0:00</span>
                    </div>
                    <div class="control-group">
                        <button class="control-btn" onclick="openFullscreen()" title="Toàn màn hình">⛶</button>
                    </div>
                </div>
            </div>

            <div class="playlist-section">
                <h3>🌊 Đổi địa điểm & Khoảnh khắc</h3>
                <div class="playlist-items">
                    <div class="playlist-item active" onclick="changeVideo('9g8XTTFZPBg', this, 'Đảo Phú Quý - Trải nghiệm Local')">
                        <img src="https://img.youtube.com/vi/9g8XTTFZPBg/hqdefault.jpg" alt="Đảo Phú Quý">
                        <span>Đảo Phú Quý</span>
                    </div>
                    <div class="playlist-item" onclick="changeVideo('jfKfPfyJRdk', this, 'Lofi Chill Biển Đêm')">
                        <img src="https://img.youtube.com/vi/jfKfPfyJRdk/hqdefault.jpg" alt="Lofi Biển Đêm">
                        <span>Lofi Biển Đêm</span>
                    </div>
                    <div class="playlist-item" onclick="changeVideo('P52EwNtzWqU', this, 'Hoàng Hôn Trên Biển')">
                        <img src="https://img.youtube.com/vi/P52EwNtzWqU/hqdefault.jpg" alt="Hoàng Hôn 4K">
                        <span>Hoàng Hôn 4K</span>
                    </div>
                    <div class="playlist-item" onclick="changeVideo('awmC8o_2s-8', this, 'Khám Phá Rạn San Hô Dưới Đáy Biển')">
                        <img src="https://img.youtube.com/vi/awmC8o_2s-8/hqdefault.jpg" alt="Lặn Biển San Hô">
                        <span>Lặn Biển San Hô</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="chat-section" id="chat-box">
            <div class="chat-header">Khu Vực Giao Lưu 🌊</div>
            
            <div class="chat-messages" id="chat-messages">
                <div class="message">
                    <div class="avatar">H</div>
                    <div class="msg-content">
                        <div class="msg-author">Hải Yến</div>
                        Ê bà ơi chill quá nè! Phú Quý đẹp xỉu!
                    </div>
                </div>
            </div>

            <div class="chat-input-wrapper">
                <button class="btn-emoji" onclick="toggleEmoji()">😀</button>
                <div class="emoji-picker" id="emoji-picker">
                    <span onclick="insertEmoji('😍')">😍</span>
                    <span onclick="insertEmoji('🔥')">🔥</span>
                    <span onclick="insertEmoji('🌊')">🌊</span>
                    <span onclick="insertEmoji('❤️')">❤️</span>
                    <span onclick="insertEmoji('✨')">✨</span>
                    <span onclick="insertEmoji('🤣')">🤣</span>
                    <span onclick="insertEmoji('🌅')">🌅</span>
                    <span onclick="insertEmoji('🏖️')">🏖️</span>
                </div>
                
                <input type="text" id="chat-input" placeholder="Nhập tin nhắn..." onkeypress="handleKeyPress(event)">
                <button class="btn-send" onclick="sendMessage()">➤</button>
            </div>
        </div>

    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        var player;
        var timeUpdater;
        var isDragging = false; 

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-video', {
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function onPlayerReady(event) {
            player.setVolume(50);
        }

        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) {
                document.getElementById('btn-play').innerText = '⏸';
                timeUpdater = setInterval(updateTime, 500);
            } else {
                document.getElementById('btn-play').innerText = '▶️';
                clearInterval(timeUpdater);
            }
        }

        function updateTime() {
            if(player && player.getCurrentTime && !isDragging) {
                var current = player.getCurrentTime();
                var duration = player.getDuration();
                var percentage = (current / duration) * 100;
                
                document.getElementById('seek-bar').value = percentage;
                document.getElementById('time-display').innerText = formatTime(current) + ' / ' + formatTime(duration);
            }
        }

        function formatTime(seconds) {
            if (isNaN(seconds) || seconds < 0) return "0:00";
            seconds = Math.round(seconds);
            var min = Math.floor(seconds / 60);
            var sec = seconds % 60;
            return min + ":" + (sec < 10 ? "0" + sec : sec);
        }

        var seekBar = document.getElementById('seek-bar');

        seekBar.addEventListener('mousedown', function() { isDragging = true; });
        seekBar.addEventListener('touchstart', function() { isDragging = true; });

        seekBar.addEventListener('mouseup', function() {
            isDragging = false;
            var duration = player.getDuration();
            var seekToTime = duration * (this.value / 100);
            player.seekTo(seekToTime, true); 
        });
        seekBar.addEventListener('touchend', function() {
            isDragging = false;
            var duration = player.getDuration();
            var seekToTime = duration * (this.value / 100);
            player.seekTo(seekToTime, true); 
        });

        function seekVideo(seconds) {
            if(player && player.getCurrentTime) {
                var current = player.getCurrentTime();
                player.seekTo(current + seconds, true);
            }
        }

        function toggleMute() {
            if (player.isMuted()) {
                player.unMute(); document.getElementById('btn-mute').innerText = '🔊';
            } else {
                player.mute(); document.getElementById('btn-mute').innerText = '🔇';
            }
        }

        function changeVolume() {
            var vol = document.getElementById('volume-slider').value;
            player.setVolume(vol);
            if (vol > 0 && player.isMuted()) { player.unMute(); document.getElementById('btn-mute').innerText = '🔊'; }
        }

        function togglePlayPause() {
            if (player.getPlayerState() == 1) { player.pauseVideo(); } 
            else { player.playVideo(); }
        }

        function changeVideo(videoId, element, titleName) {
            player.loadVideoById(videoId);
            var items = document.querySelectorAll('.playlist-item');
            items.forEach(function(item) { item.classList.remove('active'); });
            element.classList.add('active');
            document.getElementById('main-title').innerHTML = '<div class="live-dot"></div> ' + titleName;
        }

        /* --- CHAT VÀ STICKER --- */
        function toggleEmoji() { document.getElementById('emoji-picker').classList.toggle('show'); }

        function insertEmoji(emoji) {
            var input = document.getElementById('chat-input');
            input.value += emoji; input.focus();
            document.getElementById('emoji-picker').classList.remove('show');
        }

        function sendMessage() {
            const inputField = document.getElementById('chat-input');
            const messageText = inputField.value.trim();

            if (messageText !== "") {
                const chatMessages = document.getElementById('chat-messages');
                const newMessage = document.createElement('div');
                newMessage.classList.add('message', 'self');

                newMessage.innerHTML = `
                    <div class="avatar" style="background:#87CEEB; color: #000;">T</div>
                    <div class="msg-content">
                        <div class="msg-author">Thắng</div>
                        ${messageText}
                    </div>
                `;
                chatMessages.appendChild(newMessage);
                chatMessages.scrollTop = chatMessages.scrollHeight;
                inputField.value = "";
                document.getElementById('emoji-picker').classList.remove('show');
            }
        }

        function handleKeyPress(event) { if (event.key === "Enter") { sendMessage(); } }

        /* --- CÁC NÚT HIỂN THỊ --- */
        function toggleChat() { document.getElementById('chat-box').classList.toggle('hidden'); }
        function toggleSpotify() { document.getElementById('spotify-player').classList.toggle('show'); }

        function openFullscreen() {
            const playerContainer = document.getElementById("player-container");
            if (playerContainer.requestFullscreen) { playerContainer.requestFullscreen(); } 
            else if (playerContainer.webkitRequestFullscreen) { playerContainer.webkitRequestFullscreen(); }
        }
    </script>

</body>
</html>
