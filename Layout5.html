<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeaVibe - Phòng Live Tương Tác</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Asap+Condensed:wght@500;700&family=Quicksand:wght@500;600;700&display=swap');

        /* --- ĐINH BA POSEIDON --- */
        body, a, button, .playlist-item, .icon-btn, .seek-bar, .volume-slider, span, div {
            cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='36' height='36' style='font-size:26px;'><text x='18' y='26' text-anchor='middle' transform='rotate(-25 18 18)'>🔱</text></svg>") 8 4, auto !important;
        }

        input { cursor: text !important; }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            height: 100vh; width: 100vw; overflow: hidden;
            font-family: 'Quicksand', sans-serif;
            background: url('Layout-Hinhnen.jpg') no-repeat center center/cover;
            position: relative;
        }

        .vintage-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.2);
            z-index: 1; pointer-events: none;
        }

        /* --- HEADER --- */
        header {
            position: relative; z-index: 50;
            padding: 15px 40px; display: flex;
            justify-content: space-between; align-items: center;
        }

        .header-left { display: flex; align-items: center; gap: 20px; }

        .icon-btn {
            width: 45px; height: 45px; border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: rgba(0, 0, 0, 0.3); backdrop-filter: blur(8px);
            display: flex; justify-content: center; align-items: center;
            transition: 0.3s; color: #fff; font-size: 20px;
        }
        .icon-btn:hover { background: rgba(255, 255, 255, 0.2); }

        .live-title {
            color: #fff; font-size: 24px; font-weight: 700;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.8);
            display: flex; align-items: center; gap: 10px;
        }

        .live-dot {
            width: 10px; height: 10px; background-color: #ff4757;
            border-radius: 50%; box-shadow: 0 0 8px #ff4757;
            animation: blink 1.5s infinite;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        /* HEADER RIGHT */
        .header-right { display: flex; gap: 15px; align-items: center; }

        .spotify-widget-compact {
            width: 320px; height: 80px; border-radius: 12px; overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1);
        }

        /* =========================================
           NÚT CHAT - NỀN GIF NÀNG TIÊN CÁ 
           ========================================= */
        .btn-toggle-chat {
            /* Phủ gradient đen mờ 40% lên trên để chữ rõ ràng, kết hợp ảnh GIF làm nền */
            background: linear-gradient(rgba(10, 20, 30, 0.4), rgba(10, 20, 30, 0.4)), 
                        url('https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExb2RpNGJyaDc1Z2JkNjl0aWp5NXBqaXo4M2NiZTJoM2dsb29vODN0MiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/HrrD84O3O1E4M/giphy.gif') no-repeat center center / cover;
            border: 1px solid rgba(135, 206, 235, 0.6);
            padding: 10px 25px; 
            border-radius: 30px; 
            height: 48px;
            color: #fff; 
            font-weight: 700; 
            transition: 0.3s;
            display: flex; 
            align-items: center; 
            gap: 8px; 
            white-space: nowrap;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(135, 206, 235, 0.3);
            text-shadow: 1px 1px 4px #000; /* Đổ bóng đen cho chữ để nổi bật nét cắt */
            overflow: hidden;
        }
        
        .btn-toggle-chat:hover { 
            border-color: #87CEEB;
            box-shadow: 0 0 25px rgba(135, 206, 235, 0.8);
            /* Khi hover, giảm lớp mờ đi để lộ GIF sáng đẹp hơn */
            background: linear-gradient(rgba(10, 20, 30, 0.1), rgba(10, 20, 30, 0.1)), 
                        url('https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExb2RpNGJyaDc1Z2JkNjl0aWp5NXBqaXo4M2NiZTJoM2dsb29vODN0MiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/HrrD84O3O1E4M/giphy.gif') no-repeat center center / cover;
            transform: scale(1.02);
        }

        /* --- BỐ CỤC CHÍNH --- */
        .main-container {
            position: relative; z-index: 10; display: flex;
            height: calc(100vh - 115px); padding: 0 40px 30px 40px; gap: 30px;
        }

        /* KHU VỰC VIDEO */
        .video-wrapper-section {
            flex: 1; display: flex; flex-direction: column; gap: 20px; transition: all 0.4s ease;
        }

        .player-container {
            background: rgba(0, 0, 0, 0.5); 
            border: 2px solid rgba(135, 206, 235, 0.5); border-radius: 15px;
            overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            display: flex; flex-direction: column;
        }

        #video-wrapper {
            width: 100%; position: relative; padding-top: 56.25%; background: #000;
        }

        #html5-video {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover;
        }

        /* THANH TIẾN ĐỘ */
        .seek-bar-container {
            width: 100%; background: rgba(0,0,0,0.3); display: flex; align-items: center;
        }
        .seek-bar {
            width: 100%; -webkit-appearance: none; appearance: none;
            background: transparent; height: 10px; outline: none; margin: 0; z-index: 20; position: relative;
        }
        .seek-bar::-webkit-slider-runnable-track { width: 100%; height: 6px; background: rgba(255,255,255,0.2); }
        .seek-bar::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none;
            width: 16px; height: 16px; background: #87CEEB; border-radius: 50%;
            margin-top: -5px; transition: 0.2s; box-shadow: 0 0 10px rgba(135, 206, 235, 0.8);
        }
        .seek-bar::-webkit-slider-thumb:hover { transform: scale(1.3); }

        .custom-controls {
            background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(15px);
            padding: 12px 25px; display: flex; justify-content: space-between; align-items: center;
        }

        .control-group { display: flex; align-items: center; gap: 15px; }

        .control-btn {
            background: none; border: none; color: #fff; font-size: 20px; transition: 0.3s; display: flex; align-items: center;
        }
        .control-btn:hover { color: #87CEEB; transform: scale(1.1); }

        .volume-slider { width: 90px; accent-color: #87CEEB; }
        .time-display { color: #eee; font-size: 14px; font-weight: 600; margin-left: 10px; min-width: 90px; }

        /* DANH SÁCH PLAYLIST */
        .playlist-section {
            background: rgba(0,0,0,0.3); backdrop-filter: blur(10px);
            border-radius: 15px; padding: 15px; border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
        .playlist-section h3 { color: #fff; font-size: 16px; margin-bottom: 12px; font-family: 'Quicksand', sans-serif;}
        
        .playlist-items {
            display: flex; gap: 15px; overflow-x: auto; padding-bottom: 10px;
            scrollbar-width: thin; scrollbar-color: #87CEEB transparent;
        }
        .playlist-items::-webkit-scrollbar { height: 6px; }
        .playlist-items::-webkit-scrollbar-thumb { background: #87CEEB; border-radius: 10px; }

        .playlist-item {
            display: flex; align-items: center; gap: 10px;
            flex: 0 0 auto; min-width: 220px; padding: 8px; border-radius: 8px; cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; background: rgba(255,255,255,0.05);
        }
        .playlist-item:hover, .playlist-item.active { 
            border-color: #87CEEB; background: rgba(135, 206, 235, 0.15); transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .playlist-item img { width: 60px; height: 45px; object-fit: cover; border-radius: 5px; background: #222; }
        .playlist-item span { color: #fff; font-size: 14px; font-weight: 600; text-shadow: 1px 1px 3px rgba(0,0,0,0.8); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* KHU VỰC CHAT */
        .chat-section {
            flex: 0 0 25%; min-width: 320px; max-width: 400px;
            background: rgba(0, 0, 0, 0.35); backdrop-filter: blur(15px); 
            border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 15px;
            display: flex; flex-direction: column; overflow: hidden; transition: all 0.4s ease; box-shadow: -5px 0 20px rgba(0,0,0,0.2);
        }

        .chat-section.hidden { flex: 0 0 0%; min-width: 0; opacity: 0; margin-left: -30px; padding: 0; border: none; pointer-events: none; }
        .chat-header { padding: 15px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); color: #fff; font-weight: 700; text-align: center; white-space: nowrap; }
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.2) transparent; }
        .message { display: flex; gap: 10px; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .avatar { width: 35px; height: 35px; background: #87CEEB; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; color: #000; font-size: 14px; flex-shrink: 0; }
        .msg-content { background: rgba(255, 255, 255, 0.1); padding: 10px 15px; border-radius: 0 15px 15px 15px; color: #eee; font-size: 14px; line-height: 1.4; word-break: break-word; }
        .msg-author { font-size: 12px; color: #87CEEB; font-weight: 700; margin-bottom: 3px; }

        .message.self { flex-direction: row-reverse; }
        .message.self .msg-content { border-radius: 15px 0 15px 15px; background: rgba(135, 206, 235, 0.2); color: #fff; }
        .message.self .msg-author { text-align: right; color: #87CEEB; }
        .message.self .avatar { background: #f4a460; color: #fff; }

        /* KHUNG NHẬP CHAT */
        .chat-input-wrapper { padding: 15px; border-top: 1px solid rgba(255, 255, 255, 0.1); display: flex; align-items: center; gap: 8px; position: relative; }
        .btn-emoji { background: none; border: none; font-size: 24px; cursor: pointer; transition: 0.2s; }
        .btn-emoji:hover { transform: scale(1.1); filter: brightness(1.2); }
        .chat-input-wrapper input { flex: 1; padding: 10px 15px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.2); background: rgba(0, 0, 0, 0.2); color: #fff; outline: none; font-family: 'Quicksand', sans-serif; width: 100%; }
        .btn-send { background: #87CEEB; border: none; border-radius: 50%; width: 40px; height: 40px; color: #000; display: flex; justify-content: center; align-items: center; transition: 0.2s; flex-shrink: 0; cursor: pointer;}
        .btn-send:hover { background: #fff; box-shadow: 0 0 10px #87CEEB; }

        .emoji-picker { position: absolute; bottom: 65px; left: 15px; background: rgba(20, 30, 45, 0.95); border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; padding: 10px; display: none; gap: 8px; flex-wrap: wrap; width: 220px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); z-index: 20; }
        .emoji-picker.show { display: flex; animation: slideUp 0.2s ease; }
        .emoji-picker span { font-size: 24px; cursor: pointer; transition: 0.2s; }
        .emoji-picker span:hover { transform: scale(1.3); }

        /* MƯA BONG BÓNG LẤP LÁNH CỦA ĐINH BA */
        .magic-sparkle {
            position: absolute; pointer-events: none; z-index: 9999; background: #87CEEB;
            border-radius: 50%; box-shadow: 0 0 8px #00d2ff, 0 0 15px #ffffff;
            animation: sparkle-fade 0.8s ease-out forwards;
        }
        @keyframes sparkle-fade {
            0% { opacity: 1; transform: scale(1) translateY(0); }
            100% { opacity: 0; transform: scale(0) translateY(20px); }
        }

        /* RESPONSIVE */
        @media (max-width: 1024px) {
            body { height: auto; overflow-x: hidden; overflow-y: auto; }
            header { flex-direction: column; align-items: flex-start; gap: 15px; padding: 20px; }
            .header-right { width: 100%; justify-content: space-between; }
            .main-container { flex-direction: column; height: auto; padding: 0 20px 20px 20px; gap: 20px; }
            .chat-section { flex: none; width: 100%; max-width: none; height: 450px; margin-left: 0 !important; }
            .chat-section.hidden { display: none !important; }
        }
        @media (max-width: 480px) {
            .header-right { flex-direction: column; align-items: flex-start; gap: 10px; }
            .spotify-widget-compact { width: 100%; }
            .time-display { display: none; } 
            .control-group { gap: 10px; }
            .volume-slider { width: 60px; }
        }
    </style>
</head>
<body>

    <div class="vintage-overlay"></div>

    <header>
        <div class="header-left">
            <button class="icon-btn" onclick="history.back();" title="Quay lại">❮</button>
            <div class="live-title" id="main-title">
                <div class="live-dot"></div> Biển Nha Trang
            </div>
        </div>
        
        <div class="header-right">
            <div class="spotify-widget-compact">
                <iframe style="border-radius:12px" src="https://open.spotify.com/embed/playlist/0vvXsWCC9xrXsKd4FyS8kM?utm_source=generator&theme=0" width="100%" height="80" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
            </div>
            
            <button class="btn-toggle-chat" onclick="toggleChat()">💬 Ẩn / Hiện Chat</button>
        </div>
    </header>

    <div class="main-container">
        
        <div class="video-wrapper-section">
            <div class="player-container" id="player-container">
                <div id="video-wrapper">
                    <video id="html5-video" autoplay loop muted playsinline>
                        <source src="NhaTrang1.mp4" type="video/mp4">
                        Trình duyệt của bạn không hỗ trợ thẻ video.
                    </video>
                </div>
                
                <div class="seek-bar-container">
                    <input type="range" class="seek-bar" id="seek-bar" min="0" max="100" value="0">
                </div>

                <div class="custom-controls">
                    <div class="control-group">
                        <button class="control-btn" onclick="seekVideo(-10)" title="Lùi 10 giây">⏪</button>
                        <button class="control-btn" id="btn-play" onclick="togglePlayPause()" title="Phát / Tạm dừng">⏸</button>
                        <button class="control-btn" onclick="seekVideo(10)" title="Tiến 10 giây">⏩</button>
                        
                        <button class="control-btn" id="btn-mute" onclick="toggleMute()" title="Bật / Tắt âm thanh">🔇</button>
                        <input type="range" class="volume-slider" id="volume-slider" min="0" max="100" value="0" oninput="changeVolume()">
                        <span class="time-display" id="time-display">0:00 / 0:00</span>
                    </div>
                    <div class="control-group">
                        <button class="control-btn" onclick="openFullscreen()" title="Toàn màn hình">⛶</button>
                    </div>
                </div>
            </div>

            <div class="playlist-section">
                <h3>🌊 Khám phá các địa danh mới</h3>
                <div class="playlist-items">
                    <div class="playlist-item active" onclick="changeVideo('NhaTrang1.mp4', this, 'Biển Nha Trang')">
                        <img src="https://images.unsplash.com/photo-1559586616-361e46fb9617?w=300" alt="Nha Trang">
                        <span>Nha Trang</span>
                    </div>
                    <div class="playlist-item" onclick="changeVideo('HaLong1.mp4', this, 'Vịnh Hạ Long')">
                        <img src="https://images.unsplash.com/photo-1528127269322-539801943592?w=300" alt="Hạ Long">
                        <span>Hạ Long</span>
                    </div>
                    <div class="playlist-item" onclick="changeVideo('PhanThiet1.mp4', this, 'Biển Phan Thiết')">
                        <img src="https://images.unsplash.com/photo-1544158498-8ec052eeb2c0?w=300" alt="Phan Thiết">
                        <span>Phan Thiết</span>
                    </div>
                    <div class="playlist-item" onclick="changeVideo('PhuQuoc.mp4', this, 'Đảo Phú Quốc')">
                        <img src="https://images.unsplash.com/photo-1552566626-52f8b828add9?w=300" alt="Phú Quốc">
                        <span>Phú Quốc</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="chat-section" id="chat-box">
            <div class="chat-header">Khu Vực Giao Lưu 🌊</div>
            
            <div class="chat-messages" id="chat-messages">
                <div class="message">
                    <div class="avatar">Y</div>
                    <div class="msg-content">
                        <div class="msg-author">Hải Yến</div>
                        Ê bà ơi chill quá nè! Nút Chat đỉnh quá nha!
                    </div>
                </div>
            </div>

            <div class="chat-input-wrapper">
                <button class="btn-emoji" onclick="toggleEmoji()">😀</button>
                <div class="emoji-picker" id="emoji-picker">
                    <span onclick="insertEmoji('😍')">😍</span>
                    <span onclick="insertEmoji('🔥')">🔥</span>
                    <span onclick="insertEmoji('🌊')">🌊</span>
                    <span onclick="insertEmoji('❤️')">❤️</span>
                    <span onclick="insertEmoji('✨')">✨</span>
                    <span onclick="insertEmoji('🤣')">🤣</span>
                    <span onclick="insertEmoji('🌅')">🌅</span>
                    <span onclick="insertEmoji('🏖️')">🏖️</span>
                </div>
                
                <input type="text" id="chat-input" placeholder="Nhập tin nhắn..." onkeypress="handleKeyPress(event)">
                <button class="btn-send" onclick="sendMessage()">➤</button>
            </div>
        </div>

    </div>

    <script>
        // --- JAVASCRIPT TẠO HIỆU ỨNG LẤP LÁNH KHI CHUỘT DI CHUYỂN ---
        document.addEventListener('mousemove', function(e) {
            if (Math.random() < 0.2) { createSparkle(e.pageX, e.pageY); }
        });

        function createSparkle(x, y) {
            const sparkle = document.createElement('div');
            sparkle.classList.add('magic-sparkle');
            sparkle.style.left = (x + 8) + 'px';
            sparkle.style.top = (y + 12) + 'px';
            const size = Math.random() * 6 + 4; 
            sparkle.style.width = size + 'px';
            sparkle.style.height = size + 'px';
            document.body.appendChild(sparkle);
            setTimeout(() => { sparkle.remove(); }, 800);
        }

        // --- CÁC TÍNH NĂNG VIDEO ---
        const videoPlayer = document.getElementById('html5-video');
        const playBtn = document.getElementById('btn-play');
        const muteBtn = document.getElementById('btn-mute');
        const volumeSlider = document.getElementById('volume-slider');
        const seekBar = document.getElementById('seek-bar');
        const timeDisplay = document.getElementById('time-display');
        
        let isDragging = false;

        function togglePlayPause() {
            if (videoPlayer.paused) { videoPlayer.play(); } 
            else { videoPlayer.pause(); }
        }

        videoPlayer.addEventListener('play', () => playBtn.innerText = '⏸');
        videoPlayer.addEventListener('pause', () => playBtn.innerText = '▶️');

        function formatTime(seconds) {
            if (isNaN(seconds) || seconds < 0) return "0:00";
            let min = Math.floor(seconds / 60);
            let sec = Math.floor(seconds % 60);
            return min + ":" + (sec < 10 ? "0" + sec : sec);
        }

        videoPlayer.addEventListener('timeupdate', () => {
            if (!isDragging && videoPlayer.duration) {
                const current = videoPlayer.currentTime;
                const duration = videoPlayer.duration;
                seekBar.value = (current / duration) * 100;
                timeDisplay.innerText = formatTime(current) + ' / ' + formatTime(duration);
            }
        });

        seekBar.addEventListener('mousedown', () => isDragging = true);
        seekBar.addEventListener('touchstart', () => isDragging = true);

        function updateVideoTime() {
            isDragging = false;
            if (videoPlayer.duration) {
                videoPlayer.currentTime = videoPlayer.duration * (seekBar.value / 100);
            }
        }
        seekBar.addEventListener('mouseup', updateVideoTime);
        seekBar.addEventListener('touchend', updateVideoTime);

        function seekVideo(seconds) { videoPlayer.currentTime += seconds; }

        function changeVolume() {
            videoPlayer.volume = volumeSlider.value / 100;
            if (videoPlayer.volume > 0 && videoPlayer.muted) {
                videoPlayer.muted = false; muteBtn.innerText = '🔊';
            } else if (videoPlayer.volume == 0) {
                videoPlayer.muted = true; muteBtn.innerText = '🔇';
            }
        }

        function toggleMute() {
            videoPlayer.muted = !videoPlayer.muted;
            if (videoPlayer.muted) {
                muteBtn.innerText = '🔇'; volumeSlider.value = 0;
            } else {
                muteBtn.innerText = '🔊'; videoPlayer.volume = 0.5; volumeSlider.value = 50;
            }
        }

        function changeVideo(src, element, titleName) {
            videoPlayer.src = src; videoPlayer.play();
            var items = document.querySelectorAll('.playlist-item');
            items.forEach(function(item) { item.classList.remove('active'); });
            element.classList.add('active');
            document.getElementById('main-title').innerHTML = '<div class="live-dot"></div> ' + titleName;
        }

        function toggleEmoji() { document.getElementById('emoji-picker').classList.toggle('show'); }

        function insertEmoji(emoji) {
            var input = document.getElementById('chat-input');
            input.value += emoji; input.focus();
            document.getElementById('emoji-picker').classList.remove('show');
        }

        function sendMessage() {
            const inputField = document.getElementById('chat-input');
            const messageText = inputField.value.trim();

            if (messageText !== "") {
                const chatMessages = document.getElementById('chat-messages');
                const newMessage = document.createElement('div');
                newMessage.classList.add('message', 'self');

                newMessage.innerHTML = `
                    <div class="avatar" style="background:#f4a460; color: #fff;">T</div>
                    <div class="msg-content">
                        <div class="msg-author">Thắng</div>
                        ${messageText}
                    </div>
                `;
                chatMessages.appendChild(newMessage);
                chatMessages.scrollTop = chatMessages.scrollHeight;
                inputField.value = "";
                document.getElementById('emoji-picker').classList.remove('show');
            }
        }

        function handleKeyPress(event) { if (event.key === "Enter") { sendMessage(); } }

        function toggleChat() { document.getElementById('chat-box').classList.toggle('hidden'); }

        function openFullscreen() {
            const playerContainer = document.getElementById("player-container");
            if (playerContainer.requestFullscreen) { playerContainer.requestFullscreen(); } 
            else if (playerContainer.webkitRequestFullscreen) { playerContainer.webkitRequestFullscreen(); }
        }
    </script>

</body>
</html>
