<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeaVibe - Trải Nghiệm & Âm Nhạc</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Asap+Condensed:wght@500;700&family=Quicksand:wght@500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?ixlib=rb-1.2.1&auto=format&fit=crop&w=1920&q=80') no-repeat center center/cover;
            position: relative;
            font-family: 'Quicksand', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Lớp phủ vintage */
        .vintage-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(43, 91, 92, 0.2) 0%, rgba(200, 160, 120, 0.3) 100%);
            mix-blend-mode: multiply;
            z-index: 1;
            pointer-events: none;
        }

        /* --- HEADER (Giữ nguyên style của Layout 3) --- */
        header {
            position: absolute;
            top: 30px;
            left: 40px;
            right: 40px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            z-index: 10;
        }

        .icon-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 1px solid rgba(43, 91, 92, 0.3);
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(5px);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
        }

        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.7);
            transform: scale(1.05);
        }

        .icon-btn svg {
            width: 20px;
            height: 20px;
            fill: #2b5b5c;
        }

        /* --- NỘI DUNG CHÍNH --- */
        .main-content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            width: 100%;
            max-width: 900px;
            margin-top: 40px;
        }

        /* 1. KHỐI PRICING (Gói cước) */
        .pricing-container {
            display: flex;
            gap: 30px;
            justify-content: center;
            width: 100%;
        }

        .plan-card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 20px;
            padding: 30px;
            width: 320px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }

        .plan-card:hover {
            transform: translateY(-5px);
        }

        .plan-card.pro {
            background: rgba(255, 255, 255, 0.4);
            border: 2px solid rgba(255, 204, 102, 0.8);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1), 0 0 20px rgba(255, 204, 102, 0.4);
        }

        .plan-title {
            font-family: 'Asap Condensed', sans-serif;
            font-size: 28px;
            font-weight: 700;
            color: #2b5b5c;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .plan-features {
            list-style: none;
            margin-bottom: 25px;
            color: #2c1a12;
            font-size: 15px;
            font-weight: 600;
            text-align: left;
            padding-left: 20px;
        }

        .plan-features li {
            margin-bottom: 10px;
            position: relative;
        }

        .plan-features li::before {
            content: '🐚'; /* Dùng icon vỏ sò làm bullet point */
            position: absolute;
            left: -25px;
            font-size: 14px;
        }

        .btn-select {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-weight: 700;
            font-family: 'Quicksand', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-free {
            background: rgba(255, 255, 255, 0.5);
            color: #2b5b5c;
            border: 1px solid #2b5b5c;
        }

        .btn-free:hover {
            background: #2b5b5c;
            color: #fff;
        }

        .btn-pro {
            background: linear-gradient(135deg, #f4a460 0%, #d2691e 100%);
            color: #fff;
            box-shadow: 0 4px 15px rgba(244, 164, 96, 0.4);
        }

        .btn-pro:hover {
            background: linear-gradient(135deg, #d2691e 0%, #a0522d 100%);
            box-shadow: 0 6px 20px rgba(244, 164, 96, 0.6);
        }

        /* 2. KHỐI MUSIC (Spotify) */
        .music-container {
            width: 100%;
            max-width: 670px; /* Bằng tổng chiều rộng 2 thẻ pricing + khoảng cách */
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .music-header {
            font-family: 'Asap Condensed', sans-serif;
            font-size: 22px;
            font-weight: 700;
            color: #2b5b5c;
            margin-bottom: 15px;
            text-align: center;
        }

        /* Khung nhúng Spotify */
        .spotify-embed {
            border-radius: 12px;
            width: 100%;
            height: 152px; /* Chiều cao chuẩn cho thẻ playlist thu gọn của Spotify */
            border: none;
        }

    </style>
</head>
<body>

    <div class="vintage-overlay"></div>

    <header>
        <button class="icon-btn">
            <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
        </button>
    </header>

    <div class="main-content">
        
        <div class="pricing-container">
            <div class="plan-card">
                <div class="plan-title">Gói Lãng Du (Free)</div>
                <ul class="plan-features">
                    <li>Chất lượng hình ảnh 720p</li>
                    <li>Âm thanh sóng biển cơ bản</li>
                    <li>Có xuất hiện quảng cáo nhỏ</li>
                </ul>
                <button class="btn-select btn-free">Chọn Gói</button>
            </div>

            <div class="plan-card pro">
                <div class="plan-title">Gói Đại Dương (Pro)</div>
                <ul class="plan-features">
                    <li>Chất lượng 4K Ultra HD sắc nét</li>
                    <li>Mở khóa mọi góc quay & âm thanh 3D</li>
                    <li>Hoàn toàn không có quảng cáo</li>
                </ul>
                <button class="btn-select btn-pro">Nâng Cấp Ngay</button>
            </div>
        </div>

        <div class="music-container">
            <div class="music-header">🎶 Thêm nhạc Spotify vào không gian của bạn</div>
            <iframe class="spotify-embed" src="https://open.spotify.com/embed/playlist/37i9dQZF1DWYBO1MoTDhZI?utm_source=generator&theme=0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
        </div>

    </div>

</body>
</html>
