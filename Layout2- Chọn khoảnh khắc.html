<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeaVibe - Chọn Khoảnh Khắc</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Quicksand', sans-serif;
        }

        /* Container chứa hình nền để tạo hiệu ứng chuyển đổi mượt (Fade-in/Fade-out) */
        #bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            /* Hình nền mặc định (Biển xanh ngọc/Live) */
            background: url('https://images.unsplash.com/photo-1498623116890-37e912163d5d?ixlib=rb-1.2.1&auto=format&fit=crop&w=1920&q=80') no-repeat center center/cover;
            transition: background 0.8s ease-in-out; /* Hiệu ứng chuyển cảnh mượt */
        }

        /* Lớp phủ tối nhẹ để làm nổi bật các thẻ */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.2);
            z-index: 0;
        }

        /* Nội dung chính */
        .content {
            position: relative;
            z-index: 1;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        h1 {
            font-size: 36px;
            margin-bottom: 40px;
            font-weight: 700;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.3);
        }

        /* Bố cục 3 thẻ (Cards) */
        .cards-wrapper {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            background: rgba(255, 255, 255, 0.1); /* Kính mờ */
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            width: 250px;
            padding: 40px 20px;
            cursor: pointer;
            transition: transform 0.3s ease, background 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .card h2 {
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .card p {
            font-size: 14px;
            color: #e0f7fa;
        }

        /* Icon Emoji minh họa */
        .icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        /* Chấm đỏ nhấp nháy cho thẻ Live */
        .live-dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            background-color: #ff4757;
            border-radius: 50%;
            margin-left: 8px;
            box-shadow: 0 0 8px #ff4757;
            animation: blink 1.5s infinite ease-in-out;
        }

        @keyframes blink {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }

    </style>
</head>
<body>

    <div id="bg-container">
        <div class="overlay"></div>
    </div>

    <div class="content">
        <h1>Bạn muốn tận hưởng khoảnh khắc nào?</h1>
        
        <div class="cards-wrapper">
            <div class="card" onmouseover="changeBg('sunrise')" onmouseout="resetBg()">
                <div class="icon">🌅</div>
                <h2>Bình Minh</h2>
                <p>Bắt đầu ngày mới với ánh nắng dịu nhẹ</p>
            </div>

            <div class="card" onmouseover="changeBg('sunset')" onmouseout="resetBg()">
                <div class="icon">🌇</div>
                <h2>Hoàng Hôn</h2>
                <p>Thư giãn trong dải màu cam tím lãng mạn</p>
            </div>

            <div class="card" onmouseover="changeBg('live')" onmouseout="resetBg()">
                <div class="icon">🌊</div>
                <h2>Live 24/7 <span class="live-dot"></span></h2>
                <p>Nghe tiếng sóng vỗ theo thời gian thực</p>
            </div>
        </div>
    </div>

    <script>
        const bgContainer = document.getElementById('bg-container');
        
        // Link ảnh chất lượng cao cho các khoảnh khắc
        const images = {
            sunrise: 'url("https://images.unsplash.com/photo-1559827260-36ca18084793?ixlib=rb-1.2.1&auto=format&fit=crop&w=1920&q=80")',
            sunset: 'url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e?ixlib=rb-1.2.1&auto=format&fit=crop&w=1920&q=80")', // Đổi sang ảnh hoàng hôn
            live: 'url("https://images.unsplash.com/photo-1498623116890-37e912163d5d?ixlib=rb-1.2.1&auto=format&fit=crop&w=1920&q=80")',
            default: 'url("https://images.unsplash.com/photo-1498623116890-37e912163d5d?ixlib=rb-1.2.1&auto=format&fit=crop&w=1920&q=80")'
        };

        // Đã cập nhật ảnh hoàng hôn rõ rệt hơn
        images.sunset = 'url("https://images.unsplash.com/photo-1471922614646-a1284d766b11?ixlib=rb-1.2.1&auto=format&fit=crop&w=1920&q=80")'; 

        function changeBg(type) {
            bgContainer.style.background = images[type] + ' no-repeat center center/cover';
        }

        function resetBg() {
            // Có thể giữ nguyên hình nền cuối cùng hoặc trả về hình nền Live mặc định
            bgContainer.style.background = images.default + ' no-repeat center center/cover';
        }
    </script>

</body>
</html>
