<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeaVibe - Trực Tiếp Không Gian Biển</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Asap+Condensed:wght@500;700&family=Quicksand:wght@500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Quicksand', sans-serif;
            background-color: #000;
        }

        /* --- BACKGROUND YOUTUBE VIDEO --- */
        .video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* Thiết lập để iframe YouTube luôn phủ kín màn hình (cover) */
        .video-container iframe {
            width: 100vw;
            height: 56.25vw; /* Tỉ lệ 16:9 */
            min-height: 100vh;
            min-width: 177.77vh;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none; /* Không cho người dùng click vào YouTube để dừng video */
        }

        /* Lớp phủ vintage để đồng bộ màu sắc với các trang trước */
        .vintage-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(43, 91, 92, 0.15) 0%, rgba(200, 160, 120, 0.2) 100%);
            mix-blend-mode: multiply;
            z-index: 1;
            pointer-events: none;
        }

        /* --- GIAO DIỆN NGƯỜI DÙNG (UI LAYER) --- */
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none; 
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 30px 40px;
        }

        .ui-layer > * {
            pointer-events: auto;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .icon-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
        }

        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.5);
            transform: scale(1.05);
        }

        .icon-btn svg {
            width: 20px;
            height: 20px;
            fill: #fff;
        }

        /* Thông tin địa điểm & Live */
        .location-badge {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 8px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            color: #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .loc-name {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .weather-info {
            font-size: 14px;
            font-weight: 600;
            color: #f4a460;
            border-left: 1px solid rgba(255,255,255,0.3);
            padding-left: 15px;
        }

        .live-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 700;
            color: #ff4757;
            text-transform: uppercase;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background-color: #ff4757;
            border-radius: 50%;
            box-shadow: 0 0 8px #ff4757;
            animation: blink 1.5s infinite ease-in-out;
        }

        @keyframes blink {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(1.3); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* Thanh điều khiển dưới cùng */
        .bottom-controls {
            align-self: center;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            padding: 10px 25px;
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: opacity 0.5s ease;
        }

        .ui-layer:not(:hover) .bottom-controls {
            opacity: 0.4;
        }
        .bottom-controls:hover {
            opacity: 1 !important;
        }

        .control-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            transition: color 0.3s;
            display: flex;
            align-items: center;
        }

        .control-btn:hover {
            color: #f4a460;
        }

        .volume-slider {
            width: 80px;
            accent-color: #f4a460;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="video-container">
        <iframe 
            src="https://www.youtube.com/embed/FRhr4m0us5Q?autoplay=1&mute=1&controls=0&loop=1&playlist=FRhr4m0us5Q&showinfo=0" 
            frameborder="0" 
            allow="autoplay; fullscreen; picture-in-picture" 
            allowfullscreen>
        </iframe>
    </div>

    <div class="vintage-overlay"></div>

    <div class="ui-layer">
        
        <div class="header-top">
            <button class="icon-btn" title="Quay lại Bản đồ">
                <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            </button>

            <div class="location-badge">
                <div class="live-indicator">
                    <div class="live-dot"></div> LIVE
                </div>
                <div class="loc-name">Cầu Hôn - Phú Quốc</div>
                <div class="weather-info">🌅 28°C</div>
            </div>
        </div>

        <div class="bottom-controls">
            <button class="control-btn" title="Phát / Tạm dừng">⏸</button>
            <button class="control-btn" title="Bật / Tắt âm thanh">🔊</button>
            <input type="range" class="volume-slider" min="0" max="100" value="50">
            <button class="control-btn" title="Toàn màn hình">⛶</button>
        </div>

    </div>

</body>
</html>
