<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeaVibe - Chọn Địa Danh</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Asap+Condensed:wght@700&display=swap');

        /* --- CON TRỎ CHUỘT ĐINH BA --- */
        body, a, button, div, span {
            cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='36' height='36' style='font-size:26px;'><text x='18' y='26' text-anchor='middle' transform='rotate(-25 18 18)'>🔱</text></svg>") 8 4, auto !important;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Quicksand', sans-serif; }

        body {
            width: 100vw; min-height: 100vh;
            background: #050a15; /* Nền tối sâu để làm nổi bật hiệu ứng lấp lánh */
            color: #fff; display: flex; flex-direction: column; align-items: center;
            justify-content: center; position: relative; overflow-x: hidden; padding: 40px 20px;
        }

        /* Hình nền mờ ảo phía sau */
        .bg-blur {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://images.unsplash.com/photo-1518182170546-076616fdfaaf?auto=format&fit=crop&w=1920&q=80') no-repeat center center/cover;
            opacity: 0.3; z-index: 0; filter: blur(5px);
        }

        .title {
            position: relative; z-index: 10; text-align: center;
            font-size: clamp(24px, 4vw, 36px); font-weight: 700;
            text-shadow: 0 0 15px rgba(135, 206, 235, 0.8); margin-bottom: 40px;
        }

        /* --- BỐ CỤC 2 CỘT --- */
        .content-row {
            position: relative; z-index: 10; display: flex;
            flex-direction: row; align-items: center; justify-content: center;
            gap: 8vw; width: 100%; max-width: 1100px;
        }

        /* --- VÒNG TRÒN TÂM ĐỘNG --- */
        .circle-center {
            width: 50vmin; height: 50vmin; max-width: 450px; max-height: 450px;
            min-width: 260px; min-height: 260px; border-radius: 50%;
            position: relative; overflow: hidden;
            border: 4px solid rgba(135, 206, 235, 0.5);
            box-shadow: 0 0 50px rgba(0, 210, 255, 0.4);
            transition: 0.5s; animation: breathe 6s ease-in-out infinite;
        }
        .circle-center:hover { transform: scale(1.05); box-shadow: 0 0 70px rgba(0, 210, 255, 0.8); }

        .ocean-gif {
            width: 100%; height: 100%; object-fit: cover;
            /* Bạn có thể thay link GIF đại dương động của bạn ở đây */
            background: url('https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHNidjU5bmZ6bnR4ZzR0eWlybmN6eW95eXp6eXp6eXp6eXp6eXp6JmN0PWc/3o7TKMGpxxcaqzDDS8/giphy.gif') no-repeat center center/cover;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }

        /* --- DANH SÁCH VỎ SÒ BÊN PHẢI --- */
        .seashell-list { display: flex; flex-direction: column; gap: 15px; }

        .list-item {
            display: flex; align-items: center; gap: 20px;
            background: rgba(255, 255, 255, 0.05); padding: 10px 25px;
            border-radius: 50px 15px 15px 50px; border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.4s; text-decoration: none; color: inherit;
        }
        .list-item:hover {
            background: rgba(135, 206, 235, 0.15); transform: translateX(15px);
            border-color: #00d2ff; box-shadow: 0 0 20px rgba(0, 210, 255, 0.3);
        }

        /* Hình ảnh vỏ ốc trắng lấp lánh */
        .shell-frame {
            width: 60px; height: 60px; background: #fff; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
            flex-shrink: 0; animation: float 3s ease-in-out infinite;
        }
        .shell-frame img { width: 70%; height: auto; }

        .text-group { display: flex; flex-direction: column; }
        .location-name { font-family: 'Asap Condensed', sans-serif; font-size: 22px; color: #fff; letter-spacing: 1px; }
        .shell-name { font-size: 12px; color: #87CEEB; font-weight: 600; text-transform: uppercase; }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        /* MƯA BONG BÓNG LẤP LÁNH */
        .magic-sparkle {
            position: absolute; pointer-events: none; z-index: 9999; background: #87CEEB;
            border-radius: 50%; box-shadow: 0 0 8px #00d2ff, 0 0 15px #ffffff;
            animation: sparkle-fade 0.8s ease-out forwards;
        }
        @keyframes sparkle-fade {
            0% { opacity: 1; transform: scale(1) translateY(0); }
            100% { opacity: 0; transform: scale(0) translateY(20px); }
        }

        /* RESPONSIVE */
        @media (max-width: 900px) {
            .content-row { flex-direction: column; gap: 30px; }
            .circle-center { width: 60vmin; height: 60vmin; }
            .list-item { width: 100%; max-width: 320px; }
        }
    </style>
</head>
<body>

    <div class="bg-blur"></div>

    <div class="title">CHỌN NƠI BẠN MUỐN ĐẾN</div>

    <div class="content-row">
        
        <a href="Layout4.html" class="circle-center">
            <div class="ocean-gif"></div>
        </a>

        <div class="seashell-list">
            
            <a href="Layout4.html" class="list-item">
                <div class="shell-frame"><img src="https://cdn-icons-png.flaticon.com/512/1041/1041772.png" alt="Sò Điệp"></div>
                <div class="text-group">
                    <span class="shell-name">Vỏ Sò Điệp</span>
                    <span class="location-name">NHA TRANG</span>
                </div>
            </a>

            <a href="Layout4.html" class="list-item">
                <div class="shell-frame"><img src="https://cdn-icons-png.flaticon.com/512/3504/3504381.png" alt="Sò Nón"></div>
                <div class="text-group">
                    <span class="shell-name">Vỏ Sò Nón</span>
                    <span class="location-name">PHÚ QUỐC</span>
                </div>
            </a>

            <a href="Layout4.html" class="list-item">
                <div class="shell-frame"><img src="https://cdn-icons-png.flaticon.com/512/1041/1041838.png" alt="Ốc Xà Cừ"></div>
                <div class="text-group">
                    <span class="shell-name">Vỏ Ốc Xà Cừ</span>
                    <span class="location-name">MỸ KHÊ</span>
                </div>
            </a>

            <a href="Layout4.html" class="list-item">
                <div class="shell-frame"><img src="https://cdn-icons-png.flaticon.com/512/3504/3504344.png" alt="Ốc Turret"></div>
                <div class="text-group">
                    <span class="shell-name">Vỏ Ốc Turret</span>
                    <span class="location-name">KỲ CO</span>
                </div>
            </a>

            <a href="Layout4.html" class="list-item">
                <div class="shell-frame"><img src="https://cdn-icons-png.flaticon.com/512/3504/3504423.png" alt="Ốc Nautilus"></div>
                <div class="text-group">
                    <span class="shell-name">Vỏ Ốc Nautilus</span>
                    <span class="location-name">CÔN ĐẢO</span>
                </div>
            </a>

        </div>
    </div>

    <script>
        // HIỆU ỨNG LẤP LÁNH KHI CHUỘT DI CHUYỂN
        document.addEventListener('mousemove', function(e) {
            if (Math.random() < 0.2) { createSparkle(e.pageX, e.pageY); }
        });

        function createSparkle(x, y) {
            const sparkle = document.createElement('div');
            sparkle.classList.add('magic-sparkle');
            sparkle.style.left = (x + 8) + 'px';
            sparkle.style.top = (y + 12) + 'px';
            const size = Math.random() * 6 + 4; 
            sparkle.style.width = size + 'px';
            sparkle.style.height = size + 'px';
            document.body.appendChild(sparkle);
            setTimeout(() => { sparkle.remove(); }, 800);
        }
    </script>

</body>
</html>
