<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeaVibe - Khám Phá Địa Danh Biển</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Asap+Condensed:wght@500;700&family=Quicksand:wght@500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Quicksand', sans-serif;
            background: url('https://images.unsplash.com/photo-1682687982501-1e5898cb8f4b?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') no-repeat center center/cover;
            background-color: #041424; 
        }

        .deep-sea-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(10, 40, 70, 0.4) 0%, rgba(2, 10, 20, 0.9) 100%);
            z-index: 1;
            pointer-events: none;
        }

        /* --- HEADER --- */
        header {
            position: absolute;
            top: 30px; left: 40px; right: 40px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            z-index: 10;
        }

        .header-left { display: flex; align-items: center; gap: 20px; }

        .icon-btn {
            width: 45px; height: 45px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            cursor: pointer;
            display: flex; justify-content: center; align-items: center;
            color: #fff; font-size: 20px; transition: 0.3s;
        }
        .icon-btn:hover { background: rgba(255, 255, 255, 0.3); transform: scale(1.05); }

        .main-title {
            font-family: 'Asap Condensed', sans-serif;
            font-size: 32px; 
            font-weight: 700;
            color: #e0f7fa;
            text-transform: uppercase; letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255,255,255,0.5), 0 0 20px rgba(0, 210, 255, 0.8);
        }

        /* --- BỐ CỤC VÒNG TRÒN TRUNG TÂM --- */
        .circle-map-container {
            position: absolute;
            top: 58%; 
            left: 50%;
            transform: translate(-50%, -50%);
            width: 500px; height: 500px;
            z-index: 10;
        }

        /* --- ẢNH ĐỘNG GIF LẤP ĐẦY QUỸ ĐẠO LỚN --- */
        .center-gif-wrapper {
            position: absolute;
            top: 0; left: 0;
            width: 100%; 
            height: 100%;
            border-radius: 50%;
            overflow: hidden; 
            z-index: 5; 
            box-shadow: 0 0 80px rgba(0, 210, 255, 0.5), inset 0 0 30px rgba(255, 255, 255, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .center-gif {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            opacity: 0.85; 
        }

        /* Từng cụm Vỏ sò + Chữ */
        .shell-item {
            position: absolute;
            top: 50%; left: 50%;
            margin: -75px 0 0 -75px; 
            width: 150px; height: 150px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer;
            z-index: 10;
        }

        .shell-item:nth-child(2) { transform: rotate(-90deg) translate(250px) rotate(90deg); }  
        .shell-item:nth-child(3) { transform: rotate(-18deg) translate(250px) rotate(18deg); }  
        .shell-item:nth-child(4) { transform: rotate(54deg) translate(250px) rotate(-54deg); }  
        .shell-item:nth-child(5) { transform: rotate(126deg) translate(250px) rotate(-126deg); } 
        .shell-item:nth-child(6) { transform: rotate(198deg) translate(250px) rotate(-198deg); } 

        .shell-img-wrapper {
            position: relative;
            width: 100px; height: 100px;
            display: flex; justify-content: center; align-items: center;
            transition: transform 0.3s ease;
            animation: float 4s infinite ease-in-out;
        }

        .shell-item:nth-child(3) .shell-img-wrapper { animation-delay: 0.5s; }
        .shell-item:nth-child(4) .shell-img-wrapper { animation-delay: 1s; }
        .shell-item:nth-child(5) .shell-img-wrapper { animation-delay: 1.5s; }
        .shell-item:nth-child(6) .shell-img-wrapper { animation-delay: 0.2s; }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Nền trắng ôm trọn vỏ sò để đồng bộ màu */
        .shell-bg-circle {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 120px; 
            height: 120px;
            background-color: #ffffff; 
            border-radius: 50%;
            z-index: 1; 
            pointer-events: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5); 
        }

        /* Ảnh vỏ sò */
        .shell-img {
            width: 90px; 
            height: 90px;
            object-fit: contain;
            mix-blend-mode: darken; 
            position: relative;
            z-index: 2; 
        }

        .sparkle-aura {
            position: absolute;
            top: -30%; left: -30%; width: 160%; height: 160%;
            border-radius: 50%;
            background: radial-gradient(circle, transparent 40%, rgba(255, 255, 255, 0.8) 45%, rgba(0, 212, 255, 0.6) 50%, transparent 60%);
            background-size: 200% 200%;
            opacity: 0.6;
            animation: spinAndPulse 3s infinite linear;
            z-index: 0; 
            pointer-events: none;
            filter: blur(2px) brightness(1.2);
        }

        @keyframes spinAndPulse {
            0% { transform: rotate(0deg) scale(0.8); opacity: 0.3; }
            50% { transform: rotate(180deg) scale(1.1); opacity: 0.8; }
            100% { transform: rotate(360deg) scale(0.8); opacity: 0.3; }
        }

        .shell-item:hover .shell-img-wrapper {
            transform: scale(1.15); 
        }
        .shell-item:hover .sparkle-aura {
            opacity: 0.9;
            animation-duration: 1.5s; 
            filter: blur(4px) brightness(1.5);
        }

        /* --- CHỮ ĐỊA DANH --- */
        .shell-text {
            position: absolute;
            text-align: center;
            width: 250px;
            pointer-events: none; 
            transition: all 0.3s ease;
        }

        /* ĐÃ CHỈNH LẠI VỊ TRÍ CHỮ NHA TRANG XUỐNG DƯỚI VỎ SÒ */
        .shell-item:nth-child(2) .shell-text { top: 120px; left: -50px; text-align: center; } 
        .shell-item:nth-child(3) .shell-text { top: 25px; left: 165px; text-align: left; }   
        .shell-item:nth-child(4) .shell-text { top: 130px; left: 110px; text-align: left; }   
        .shell-item:nth-child(5) .shell-text { top: 130px; right: 110px; text-align: right; } 
        .shell-item:nth-child(6) .shell-text { top: 25px; right: 165px; text-align: right; }  

        .shell-type {
            font-size: 16px;
            color: #b2ebf2;
            font-weight: 600;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            margin-bottom: 2px;
        }

        .shell-name {
            font-size: 28px; 
            font-weight: 700;
            color: #ffffff; 
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 10px #ffffff, 0 0 20px #00d2ff, 0 0 30px #00d2ff, 0 4px 10px rgba(0,0,0,1); 
        }

        .shell-item:hover .shell-name {
            text-shadow: 0 0 15px #ffffff, 0 0 30px #00d2ff, 0 0 50px #00d2ff;
            transform: scale(1.1);
        }

    </style>
</head>
<body>

    <div class="deep-sea-overlay"></div>

    <header>
        <div class="header-left">
            <button class="icon-btn" onclick="history.back();">❮</button>
            <h1 class="main-title">KHÁM PHÁ ĐỊA DANH BIỂN</h1>
        </div>
        </header>

    <div class="circle-map-container">

        <div class="center-gif-wrapper">
            <img src="https://kenh14cdn.com/thumb_w/500/LJ9BRCA2SwO2i2yoqIMzIMq9QI2QMI/Image/2015/07/b1-c4c87.gif" alt="Center Animation" class="center-gif">
        </div>

        <div class="shell-item" onclick="window.location.href='Layout4.html';">
            <div class="shell-img-wrapper">
                <div class="sparkle-aura"></div>
                <div class="shell-bg-circle"></div> 
                <img src="So1.png" alt="Vỏ sò điệp" class="shell-img">
            </div>
            <div class="shell-text">
                <div class="shell-type">Vỏ Sò Điệp</div>
                <div class="shell-name">NHA TRANG</div>
            </div>
        </div>

        <div class="shell-item" onclick="window.location.href='Layout4.html';">
            <div class="shell-img-wrapper">
                <div class="sparkle-aura"></div>
                <div class="shell-bg-circle"></div>
                <img src="So2.png" alt="Vỏ ốc xà cừ" class="shell-img">
            </div>
            <div class="shell-text">
                <div class="shell-type">Vỏ Ốc Xà Cừ</div>
                <div class="shell-name">MỸ KHÊ</div>
            </div>
        </div>

        <div class="shell-item" onclick="window.location.href='Layout4.html';">
            <div class="shell-img-wrapper">
                <div class="sparkle-aura"></div>
                <div class="shell-bg-circle"></div>
                <img src="So3.png" alt="Vỏ ốc Nautilus" class="shell-img">
            </div>
            <div class="shell-text">
                <div class="shell-type">Vỏ Ốc Nautilus</div>
                <div class="shell-name">CÔN ĐẢO</div>
            </div>
        </div>

        <div class="shell-item" onclick="window.location.href='Layout4.html';">
            <div class="shell-img-wrapper">
                <div class="sparkle-aura"></div>
                <div class="shell-bg-circle"></div>
                <img src="So4.png" alt="Vỏ ốc Turret" class="shell-img">
            </div>
            <div class="shell-text">
                <div class="shell-type">Vỏ Ốc Turret</div>
                <div class="shell-name">KỲ CO</div>
            </div>
        </div>

        <div class="shell-item" onclick="window.location.href='Layout4.html';">
            <div class="shell-img-wrapper">
                <div class="sparkle-aura"></div>
                <div class="shell-bg-circle"></div>
                <img src="So5.png" alt="Vỏ sò nón" class="shell-img">
            </div>
            <div class="shell-text">
                <div class="shell-type">Vỏ Sò Nón</div>
                <div class="shell-name">PHÚ QUỐC</div>
            </div>
        </div>

    </div>

</body>
</html>
